kind = "web"
previewPath = "/"
title = "JBS Comercialização"
version = "1.0.0"
id = "artifacts/jbs-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25409

[services.development]
run = "pnpm --filter @workspace/jbs-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jbs-landing", "run", "build" ]
publicDir = "artifacts/jbs-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25409"
BASE_PATH = "/"
